<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ジャングル元気玉ゲーム</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- UI -->
    <div id="ui">

        <div id="timer">
            残り時間：<span id="time">20</span>
        </div>

        <div id="score">
            連打数：<span id="count">0</span>
        </div>

    </div>

    <!-- ゲームエリア -->
    <div id="game">

        <!-- 主人公 -->
        <div id="player">🧑</div>

        <!-- 元気玉 -->
        <div id="spiritBall"></div>

        <!-- ラスボス -->
        <div id="boss">🦍</div>

    </div>

    <!-- ボタン -->
    <button id="tapButton">
        連打！！
    </button>

    <script src="main.js"></script>

</body>
</html>
