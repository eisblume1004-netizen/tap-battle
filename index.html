<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ジャングル元気玉ゲーム</title>

<script type="importmap">
{
    "imports": {
        "three":"https://unpkg.com/three@0.179.1/build/three.module.js"
    }
}
</script>

<link rel="stylesheet" href="style.css">

</head>

<body>
<div id="info">
    残り時間：<span id="time">20</span><br>
    連打数：<span id="count">0</span>
</div>

<div id="message"></div>
<script type="module" src="main.js"></script>
<!-- レベル選択画面：index.html の </body> の直前に追加 -->
<div id="levelSelect">
    <div id="levelSelectPanel">
        <h1>レベルをえらんでね！</h1>
        <p class="levelDescription">20びょうでボタンをたくさんおそう！</p>

        <div id="levelButtons">
            <button type="button" class="levelButton" data-level="A" data-target="10">
                <span class="levelName">A</span>
            </button>

            <button type="button" class="levelButton" data-level="B" data-target="25">
                <span class="levelName">B</span>
            </button>

            <button type="button" class="levelButton" data-level="C" data-target="40">
                <span class="levelName">C</span>
            </button>
        </div>
    </div>
</div>

</body>
</html>
